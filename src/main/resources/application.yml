server:
  port: ${PORT:8080}
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-lifestyle-assistant
  ai:
    mcp:
      server:
        name: ai-lifestyle-assistant
        version: 0.1.0
        instructions: >
          LifeMate(라이프메이트)는 사용자의 지역과 외출 목적을 바탕으로
          최신 날씨 예보와 대기질 수치를 조회해 외출 안전 브리핑을 제공하는
          한국어 생활 비서입니다. 강수, 미세먼지, 자외선, 체감온도, 바람을
          종합해 종합 브리핑, 대기질 확인, 날씨 위험 확인, 활동별 준비물 체크리스트를 제공합니다.
          의료·재난 판단을 대신하지 않으며 공식 특보와 현지 안내를 우선합니다.
        type: SYNC
        protocol: STATELESS
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        tool-callback-converter: false
        annotation-scanner:
          enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.agenticplayer.lifestyle: INFO
